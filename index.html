<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storyline Archiver | Historical Restoration Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --card: #0f0f0f;
            --accent: #c9a86a;
            --text: #e0e0e0;
            --text-dim: #777;
            --border: #222;
            --input-bg: #151515;
            --success: #4caf50;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 1000px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-family: 'Cinzel', serif;
            color: var(--accent);
            font-size: 2rem;
            letter-spacing: 4px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 0.8rem;
            color: var(--text-dim);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .panel {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 30px;
            border-radius: 4px;
            margin-bottom: 20px;
        }

        /* Drop Zone */
        .drop-zone {
            border: 2px dashed var(--border);
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            background: #0a0a0a;
            margin-bottom: 20px;
        }
        .drop-zone:hover { border-color: var(--accent); background: #111; }
        .drop-zone p { font-size: 1rem; color: #888; letter-spacing: 1px; }

        #preview-container {
            display: none;
            text-align: center;
            margin-bottom: 20px;
        }
        #asset-preview {
            max-width: 100%;
            max-height: 400px;
            border: 1px solid var(--border);
        }

        /* Profile Selector */
        .profile-selector-container {
            margin-bottom: 20px;
            padding: 15px;
            background: #111;
            border: 1px solid var(--border);
            border-radius: 4px;
        }
        .profile-selector-container label {
            display: block;
            font-size: 0.75rem;
            color: var(--accent);
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        .profile-selector-container select {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border);
            padding: 12px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            outline: none;
            cursor: pointer;
        }

        /* Accordion */
        .accordion { display: none; margin-top: 20px; }
        .accordion-item { border-bottom: 1px solid var(--border); }
        .accordion-header {
            padding: 15px 0;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--accent);
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding-bottom: 0;
        }
        .accordion-item.active .accordion-content {
            max-height: 1000px;
            padding-bottom: 20px;
        }

        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; font-weight: 700; }
        .input-group input {
            background: var(--input-bg);
            border: 1px solid var(--border);
            padding: 10px;
            color: var(--text);
            font-size: 0.8rem;
            outline: none;
        }
        .input-group input:focus { border-color: var(--accent); }

        /* Buttons */
        .action-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .btn { padding: 18px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: 0.3s; border: none; }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-primary:hover { background: #dcb97a; }
        .btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

        #status { margin-top: 20px; text-align: center; font-size: 0.85rem; font-weight: 600; min-height: 1.2em; }
        .utility-btns { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
        .util-btn { background: transparent; border: 1px solid var(--border); color: var(--text-dim); padding: 5px 12px; font-size: 0.6rem; cursor: pointer; }
        .util-btn:hover { color: var(--accent); border-color: var(--accent); }

        #download-area { display: none; text-align: center; margin-top: 30px; padding: 20px; border: 1px solid var(--success); background: rgba(76, 175, 80, 0.05); }
        .btn-download { background: var(--success); color: white; padding: 15px 30px; text-decoration: none; display: inline-block; font-weight: 700; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>STORYLINE ARCHIVER</h1>
            <p>Invisible Watermark Disruption & Metadata Rebuilder</p>
        </div>

        <div class="panel">
            <div class="drop-zone" id="drop-zone">
                <p id="drop-text">DEPOSIT ASSET TO BEGIN ANALYSIS</p>
                <input type="file" id="file-input" style="display: none;" accept="image/jpeg,image/png,image/webp">
            </div>

            <div id="preview-container">
                <img id="asset-preview" src="" alt="Preview">
            </div>

            <div id="status"></div>

            <div id="download-area">
                <p style="color: var(--success); margin-bottom: 15px;">PROCESSING COMPLETE</p>
                <a href="#" id="download-link" class="btn-download">DOWNLOAD PROCESSED IMAGE</a>
            </div>

            <div id="editor-ui" style="display: none;">
                
                <div class="profile-selector-container">
                    <label>Hardware Profile Override</label>
                    <select id="device-profile">
                        <option value="epson">Legacy Archive: Epson Perfection V850 Pro</option>
                        <option value="iphone16">Mobile Capture: Apple iPhone 16 Pro</option>
                        <option value="iphone13">Mobile Capture: Apple iPhone 13 Pro</option>
                    </select>
                </div>

                <div class="accordion" id="accordion" style="display: block;">
                    <div class="accordion-item active">
                        <div class="accordion-header">Camera Information <span>+</span></div>
                        <div class="accordion-content" id="section-camera"></div>
                    </div>
                    <div class="accordion-item">
                        <div class="accordion-header">Image Settings <span>+</span></div>
                        <div class="accordion-content" id="section-settings"></div>
                    </div>
                    <div class="accordion-item">
                        <div class="accordion-header">GPS Location <span>+</span></div>
                        <div class="accordion-content" id="section-gps"></div>
                    </div>
                    <div class="accordion-item">
                        <div class="accordion-header">Author & Copyright <span>+</span></div>
                        <div class="accordion-content" id="section-author"></div>
                    </div>
                </div>

                <div class="utility-btns">
                    <button class="util-btn" onclick="exportMeta('txt')">EXPORT TXT</button>
                    <button class="util-btn" onclick="exportMeta('csv')">EXPORT CSV</button>
                    <button class="util-btn" onclick="exportMeta('json')">EXPORT JSON</button>
                </div>

                <div class="action-bar">
                    <button class="btn btn-secondary" id="btn-auto">AUTO INJECT</button>
                    <button class="btn btn-primary" id="btn-process">PROCESS & DOWNLOAD</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const preview = document.getElementById('asset-preview');
        const previewContainer = document.getElementById('preview-container');
        const status = document.getElementById('status');
        const editorUI = document.getElementById('editor-ui');
        const downloadArea = document.getElementById('download-area');
        const downloadLink = document.getElementById('download-link');
        const deviceProfileSelect = document.getElementById('device-profile');

        let currentTempFile = null;
        let originalName = null;
        let dynamicProps = {};

        // Base Schemas for different devices
        const deviceSchemas = {
            epson: {
                camera: {
                    "EXIF:Make": "Epson",
                    "EXIF:Model": "Perfection V850 Pro",
                    "EXIF:LensModel": "Standard Flatbed Lens",
                    "EXIF:LensMake": "Epson",
                    "EXIF:SerialNumber": "V850-994821",
                    "EXIF:Software": "VueScan 9"
                },
                settings: {
                    "EXIF:FNumber": "8.0",
                    "EXIF:ISO": "100",
                    "EXIF:FocalLength": "50mm",
                    "EXIF:FocalLengthIn35mmFormat": "50mm",
                    "EXIF:ShutterSpeedValue": "1/125",
                    "EXIF:ApertureValue": "8.0"
                }
            },
            iphone16: {
                camera: {
                    "EXIF:Make": "Apple",
                    "EXIF:Model": "iPhone 16 Pro",
                    "EXIF:LensModel": "iPhone 16 Pro back camera 6.86mm f/1.78",
                    "EXIF:LensMake": "Apple",
                    "EXIF:SerialNumber": "F17N3820QW",
                    "EXIF:Software": "iOS 18.0"
                },
                settings: {
                    "EXIF:FNumber": "1.78",
                    "EXIF:ISO": "80",
                    "EXIF:FocalLength": "6.86mm",
                    "EXIF:FocalLengthIn35mmFormat": "24mm",
                    "EXIF:ShutterSpeedValue": "1/100",
                    "EXIF:ApertureValue": "1.78"
                }
            },
            iphone13: {
                camera: {
                    "EXIF:Make": "Apple",
                    "EXIF:Model": "iPhone 13 Pro",
                    "EXIF:LensModel": "iPhone 13 Pro back triple camera 5.7mm f/1.5",
                    "EXIF:LensMake": "Apple",
                    "EXIF:SerialNumber": "C39G7843KL",
                    "EXIF:Software": "iOS 17.5"
                },
                settings: {
                    "EXIF:FNumber": "1.5",
                    "EXIF:ISO": "50",
                    "EXIF:FocalLength": "5.7mm",
                    "EXIF:FocalLengthIn35mmFormat": "26mm",
                    "EXIF:ShutterSpeedValue": "1/120",
                    "EXIF:ApertureValue": "1.5"
                }
            }
        };

        let currentPayload = {
            camera: { ...deviceSchemas.epson.camera },
            settings: { ...deviceSchemas.epson.settings, "EXIF:Orientation": "Horizontal (normal)", "EXIF:Flash": "Off, Did not fire", "EXIF:WhiteBalance": "Auto", "EXIF:ExposureProgram": "Normal", "EXIF:ExposureMode": "Auto" },
            gps: {
                "GPS:GPSLatitude": "24.2513",
                "GPS:GPSLongitude": "89.9167",
                "GPS:GPSAltitude": "14",
                "GPS:GPSLatitudeRef": "N",
                "GPS:GPSLongitudeRef": "E"
            },
            author: {
                "EXIF:DateTimeOriginal": "1971:12:11 12:00:00",
                "EXIF:CreateDate": "1971:12:11 12:00:00",
                "EXIF:Artist": "Bayezid Storyline",
                "EXIF:Copyright": "© 2026 Bayezid Storyline",
                "EXIF:ImageDescription": "Historical Archive Restoration"
            }
        };

        function buildForm() {
            const sections = {
                'section-camera': currentPayload.camera,
                'section-settings': currentPayload.settings,
                'section-gps': currentPayload.gps,
                'section-author': currentPayload.author
            };

            for (const [id, data] of Object.entries(sections)) {
                const container = document.getElementById(id);
                container.innerHTML = '';
                for (const [key, val] of Object.entries(data)) {
                    const group = document.createElement('div');
                    group.className = 'input-group';
                    const label = key.split(':').pop().replace(/([A-Z])/g, ' $1').trim();
                    group.innerHTML = `<label>${label}</label><input type="text" data-key="${key}" value="${val}">`;
                    container.appendChild(group);
                }
            }
        }

        buildForm();

        // Switch device profiles on dropdown change
        deviceProfileSelect.addEventListener('change', (e) => {
            const selected = e.target.value;
            currentPayload.camera = { ...deviceSchemas[selected].camera };
            
            // Merge device specific settings with base settings
            currentPayload.settings = { ...currentPayload.settings, ...deviceSchemas[selected].settings };
            buildForm();
        });

        // Accordion Logic
        document.querySelectorAll('.accordion-header').forEach(header => {
            header.onclick = () => {
                const item = header.parentElement;
                item.classList.toggle('active');
            };
        });

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = e => handleUpload(e.target.files[0]);

        async function handleUpload(file) {
            if (!file) return;
            originalName = file.name;
            downloadArea.style.display = 'none';
            editorUI.style.display = 'none';
            status.textContent = "PHASE 1: DISRUPTING PIXEL LATTICE...";
            status.style.color = "var(--accent)";

            const formData = new FormData();
            formData.append('image', file);

            try {
                const res = await fetch('/analyze', { method: 'POST', body: formData });
                const data = await res.json();
                
                currentTempFile = data.tempFile;
                dynamicProps = data.dynamicMetadata;

                const reader = new FileReader();
                reader.onload = e => {
                    preview.src = e.target.result;
                    previewContainer.style.display = 'block';
                };
                reader.readAsDataURL(file);

                status.textContent = "PHASE 2: DYNAMIC ANALYSIS COMPLETE.";
                status.style.color = "var(--success)";
                editorUI.style.display = 'block';

            } catch (err) {
                status.textContent = "ERROR: " + err.message;
                status.style.color = "#f44336";
            }
        }

        async function processImage(isAuto) {
            status.textContent = "PHASE 3: INJECTING ARCHIVAL METADATA...";
            status.style.color = "var(--accent)";
            
            const metadata = {};
            document.querySelectorAll('#editor-ui input').forEach(input => {
                metadata[input.dataset.key] = input.value;
            });

            const preservedKeys = [
                "ImageWidth", "ImageHeight", "BitsPerSample", "SamplesPerPixel", "ColorSpace", 
                "Compression", "PhotometricInterpretation", "YCbCrPositioning", "PlanarConfiguration", 
                "ComponentsConfiguration", "CompressedBitsPerPixel"
            ];
            preservedKeys.forEach(k => {
                if (dynamicProps && dynamicProps[k]) metadata[`EXIF:${k}`] = dynamicProps[k];
            });

            try {
                const res = await fetch('/process', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        tempFile: currentTempFile,
                        metadata: metadata,
                        originalName: originalName
                    })
                });
                const data = await res.json();

                downloadLink.href = data.downloadUrl;
                downloadLink.download = data.fileName;
                downloadArea.style.display = 'block';
                status.textContent = "ASSET REBUILT PERFECTLY.";
                status.style.color = "var(--success)";
                
                if (isAuto) downloadLink.click();
            } catch (err) {
                status.textContent = "ERROR: " + err.message;
                status.style.color = "#f44336";
            }
        }

        document.getElementById('btn-auto').onclick = () => processImage(true);
        document.getElementById('btn-process').onclick = () => processImage(false);

        function exportMeta(format) {
            const metadata = {};
            document.querySelectorAll('#editor-ui input').forEach(input => {
                metadata[input.dataset.key] = input.value;
            });
            
            let content = "";
            let mime = "text/plain";
            
            if (format === 'json') {
                content = JSON.stringify(metadata, null, 2);
                mime = "application/json";
            } else if (format === 'csv') {
                content = "Tag,Value\n" + Object.entries(metadata).map(e => `${e[0]},"${e[1]}"`).join("\n");
                mime = "text/csv";
            } else {
                content = Object.entries(metadata).map(e => `${e[0]}: ${e[1]}`).join("\n");
            }

            const blob = new Blob([content], { type: mime });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `metadata_export.${format}`;
            a.click();
        }
    </script>
</body>
</html>
