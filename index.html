
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bayezid Storyline Archival Tool - High-Res Signature Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #0056b3;
            --secondary-color: #007bff;
            --background-color: #f0f2f5;
            --card-background: #ffffff;
            --text-color: #333333;
            --light-text-color: #666666;
            --border-color: #e0e0e0;
            --success-color: #28a745;
            --error-color: #dc3545;
        }

        body {
            font-family: 'Roboto', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--background-color);
            color: var(--text-color);
            line-height: 1.6;
        }

        .container {
            background-color: var(--card-background);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 95%;
            max-width: 1000px;
            margin: 20px auto;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--primary-color);
            margin-bottom: 15px;
            font-size: 2.5em;
        }

        .tagline {
            color: var(--light-text-color);
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .main-workflow {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            text-align: left;
        }

        @media (max-width: 800px) {
            .main-workflow {
                grid-template-columns: 1fr;
            }
        }

        .upload-section {
            border-right: 1px solid var(--border-color);
            padding-right: 30px;
        }

        @media (max-width: 800px) {
            .upload-section {
                border-right: none;
                border-bottom: 1px solid var(--border-color);
                padding-right: 0;
                padding-bottom: 30px;
            }
        }

        .drop-area {
            border: 3px dashed var(--border-color);
            border-radius: 10px;
            padding: 40px 20px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            background-color: #fdfdfd;
            text-align: center;
        }

        .drop-area:hover,
        .drop-area.highlight {
            background-color: #e9f5ff;
            border-color: var(--secondary-color);
        }

        .image-preview-container {
            margin-top: 20px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            display: none;
            background-color: #000;
            max-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #image-preview {
            max-width: 100%;
            max-height: 400px;
            object-fit: contain;
        }

        .profile-editor {
            text-align: left;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 0.9em;
        }

        .form-group input[type="text"],
        .form-group textarea {
            width: calc(100% - 24px);
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.95em;
        }

        .action-buttons {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-success {
            background-color: var(--success-color);
            color: white;
            display: none; /* Only show after upload */
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 5px;
            font-weight: bold;
            display: none;
        }

        .metadata-preview {
            margin-top: 30px;
            background-color: #f9f9f9;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            font-family: monospace;
            font-size: 0.85em;
            white-space: pre-wrap;
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bayezid Storyline Archival Tool</h1>
        <p class="tagline">High-Resolution Signature Edition: Upload, Customize, and Preserve.</p>

        <div class="main-workflow">
            <div class="upload-section">
                <h2>1. Upload Image</h2>
                <div class="drop-area" id="drop-area">
                    <p>Drag & Drop or Click to Upload</p>
                    <input type="file" id="fileInput" accept="image/jpeg, image/png, image/webp">
                </div>
                
                <div class="image-preview-container" id="preview-container" style="display: none;">
                    <img id="image-preview" src="" alt="Preview">
                </div>

                <div class="message" id="message"></div>

                <div class="action-buttons">
                    <button id="process-btn" class="btn-success">Process & Download High-Res</button>
                </div>
            </div>

            <div class="profile-editor">
                <h2>2. Customize Metadata</h2>
                <div class="form-group">
                    <label for="make">Make:</label>
                    <input type="text" id="make" value="Epson">
                </div>
                <div class="form-group">
                    <label for="model">Model:</label>
                    <input type="text" id="model" value="Perfection V850 Pro">
                </div>
                <div class="form-group">
                    <label for="artist">Artist:</label>
                    <input type="text" id="artist" value="Bayezid Storyline">
                </div>
                <div class="form-group">
                    <label for="description">Description:</label>
                    <textarea id="description" rows="2"></textarea>
                </div>
                <div class="form-group">
                    <label for="keywords">Keywords:</label>
                    <input type="text" id="keywords">
                </div>
                
                <div class="metadata-preview" id="metadata-preview">
                    <!-- Preview updates here -->
                </div>
                
                <button id="saveProfile" class="btn-primary" style="width: 100%; margin-top: 15px;">Save Profile Defaults</button>
            </div>
        </div>
    </div>

    <script>
        const dropArea = document.getElementById("drop-area");
        const fileInput = document.getElementById("fileInput");
        const imagePreview = document.getElementById("image-preview");
        const previewContainer = document.getElementById("preview-container");
        const processBtn = document.getElementById("process-btn");
        const messageDiv = document.getElementById("message");
        const metadataPreview = document.getElementById("metadata-preview");

        let currentFile = null;

        const fields = ["make", "model", "artist", "description", "keywords"];

        // Load saved profile
        document.addEventListener("DOMContentLoaded", () => {
            fields.forEach(f => {
                const val = localStorage.getItem(f);
                if (val) document.getElementById(f).value = val;
            });
            updatePreview();
        });

        function updatePreview() {
            let text = "ARCHIVAL PREVIEW:\n";
            fields.forEach(f => {
                text += `${f.toUpperCase()}: ${document.getElementById(f).value}\n`;
            });
            text += "DATE: (Randomized)\nSERIAL: (Randomized)";
            metadataPreview.textContent = text;
        }

        fields.forEach(f => document.getElementById(f).addEventListener("input", updatePreview));

        document.getElementById("saveProfile").addEventListener("click", () => {
            fields.forEach(f => localStorage.setItem(f, document.getElementById(f).value));
            alert("Profile Defaults Saved!");
        });

        dropArea.addEventListener("click", () => fileInput.click());
        fileInput.addEventListener("change", e => handleFile(e.target.files[0]));
        dropArea.addEventListener("dragover", e => { e.preventDefault(); dropArea.classList.add("highlight"); });
        dropArea.addEventListener("dragleave", () => dropArea.classList.remove("highlight"));
        dropArea.addEventListener("drop", e => {
            e.preventDefault();
            dropArea.classList.remove("highlight");
            handleFile(e.dataTransfer.files[0]);
        });

        function handleFile(file) {
            if (!file) return;
            currentFile = file;
            const reader = new FileReader();
            reader.onload = e => {
                imagePreview.src = e.target.result;
                previewContainer.style.display = "flex";
                processBtn.style.display = "block";
                messageDiv.style.display = "none";
            };
            reader.readAsDataURL(file);
        }

        processBtn.addEventListener("click", async () => {
            if (!currentFile) return;

            processBtn.disabled = true;
            processBtn.textContent = "Processing High-Res...";
            messageDiv.style.display = "block";
            messageDiv.textContent = "Injecting Metadata...";
            messageDiv.style.backgroundColor = "#e9f5ff";
            messageDiv.style.color = "#0056b3";

            const formData = new FormData();
            formData.append("image", currentFile);
            
            const meta = {};
            // Include all standard fields for the backend
            const allFields = ["make", "model", "artist", "description", "keywords"];
            allFields.forEach(f => meta[f] = document.getElementById(f).value);
            
            // Add defaults for missing fields from previous version
            meta.software = "VueScan 9";
            meta.copyright = `© 2026 ${meta.artist}`;
            meta.byline = meta.artist;
            meta.copyrightNotice = `All Rights Reserved. Restored by ${meta.artist}.`;
            meta.objectName = "Historical Archive";

            formData.append("customMetadata", JSON.stringify(meta));

            try {
                const res = await fetch("/upload", { method: "POST", body: formData });
                if (res.ok) {
                    const blob = await res.blob();
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement("a");
                    a.href = url;
                    a.download = `Archive_${currentFile.name}`;
                    a.click();
                    messageDiv.textContent = "Success! High-Res Archive Downloaded.";
                    messageDiv.style.backgroundColor = "#e6ffe6";
                    messageDiv.style.color = "#28a745";
                } else {
                    throw new Error(await res.text());
                }
            } catch (err) {
                messageDiv.textContent = "Error: " + err.message;
                messageDiv.style.backgroundColor = "#ffe6e6";
                messageDiv.style.color = "#dc3545";
            } finally {
                processBtn.disabled = false;
                processBtn.textContent = "Process & Download High-Res";
            }
        });
    </script>
</body>
</html>
