
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bayezid Storyline Archival Tool - Signature Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #0056b3;
            --secondary-color: #007bff;
            --background-color: #f0f2f5;
            --card-background: #ffffff;
            --text-color: #333333;
            --light-text-color: #666666;
            --border-color: #e0e0e0;
            --success-color: #28a745;
            --error-color: #dc3545;
        }

        body {
            font-family: 'Roboto', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--background-color);
            color: var(--text-color);
            line-height: 1.6;
        }

        .container {
            background-color: var(--card-background);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 90%;
            max-width: 900px;
            margin: 20px auto;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--primary-color);
            margin-bottom: 15px;
            font-size: 2.5em;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            color: var(--primary-color);
            margin-top: 30px;
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        .tagline {
            color: var(--light-text-color);
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .drop-area {
            border: 3px dashed var(--border-color);
            border-radius: 10px;
            padding: 50px 30px;
            margin-bottom: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            background-color: #fdfdfd;
        }

        .drop-area:hover,
        .drop-area.highlight {
            background-color: #e9f5ff;
            border-color: var(--secondary-color);
        }

        .drop-area p {
            margin: 0;
            font-size: 1.2em;
            color: var(--light-text-color);
        }

        input[type="file"] {
            display: none;
        }

        .message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 5px;
            font-weight: bold;
            color: var(--success-color);
            background-color: #e6ffe6;
            border: 1px solid var(--success-color);
            display: none; /* Hidden by default */
        }

        .message.error {
            color: var(--error-color);
            background-color: #ffe6e6;
            border: 1px solid var(--error-color);
        }

        .profile-editor,
        .metadata-preview {
            margin-top: 40px;
            border-top: 1px solid var(--border-color);
            padding-top: 30px;
            text-align: left;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: var(--text-color);
        }

        .form-group input[type="text"],
        .form-group textarea {
            width: calc(100% - 24px); /* Account for padding and border */
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1em;
            color: var(--text-color);
            background-color: #fdfdfd;
            transition: border-color 0.3s ease;
        }

        .form-group input[type="text"]:focus,
        .form-group textarea:focus {
            border-color: var(--secondary-color);
            outline: none;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: 700;
            transition: background-color 0.3s ease, transform 0.2s ease;
            margin-top: 10px;
        }

        button:hover {
            background-color: var(--secondary-color);
            transform: translateY(-2px);
        }

        .metadata-preview-content {
            background-color: #f9f9f9;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            font-family: monospace;
            white-space: pre-wrap;
            text-align: left;
            font-size: 0.9em;
            color: var(--light-text-color);
            max-height: 300px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bayezid Storyline Archival Tool</h1>
        <p class="tagline">Preserve history, define legacy. Strip AI fingerprints, inject authentic narratives.</p>

        <div class="drop-area" id="drop-area">
            <p>Drag & Drop your image here or click to select</p>
            <input type="file" id="fileInput" accept="image/jpeg, image/png, image/webp">
        </div>
        <div class="message" id="message"></div>

        <div class="profile-editor">
            <h2>Custom Metadata Profile</h2>
            <div class="form-group">
                <label for="make">Make:</label>
                <input type="text" id="make" value="Epson">
            </div>

            <div class="form-group">
                <label for="model">Model:</label>
                <input type="text" id="model" value="Perfection V850 Pro">
            </div>

            <div class="form-group">
                <label for="software">Software:</label>
                <input type="text" id="software" value="VueScan 9">
            </div>

            <div class="form-group">
                <label for="artist">Artist:</label>
                <input type="text" id="artist" value="Bayezid Storyline">
            </div>

            <div class="form-group">
                <label for="copyright">Copyright:</label>
                <input type="text" id="copyright" value="© 2026 Bayezid Storyline">
            </div>

            <div class="form-group">
                <label for="byline">By-line:</label>
                <input type="text" id="byline" value="Bayezid Storyline">
            </div>

            <div class="form-group">
                <label for="copyrightNotice">Copyright Notice:</label>
                <input type="text" id="copyrightNotice" value="All Rights Reserved. Restored by Bayezid Storyline.">
            </div>

            <div class="form-group">
                <label for="objectName">Object Name:</label>
                <input type="text" id="objectName" value="Historical Archive">
            </div>

            <div class="form-group">
                <label for="description">Description (Caption-Abstract):</label>
                <textarea id="description" rows="3" placeholder="Detailed description of the image content..."></textarea>
            </div>

            <div class="form-group">
                <label for="keywords">Keywords (comma-separated):</label>
                <input type="text" id="keywords" placeholder="historical, archive, Bayezid, etc.">
            </div>

            <button id="saveProfile">Save Profile</button>
        </div>

        <div class="metadata-preview">
            <h2>Live Metadata Preview</h2>
            <div class="metadata-preview-content" id="metadata-preview-content">
                <!-- Live metadata will be displayed here -->
            </div>
        </div>
    </div>

    <script>
        const dropArea = document.getElementById("drop-area");
        const fileInput = document.getElementById("fileInput");
        const messageDiv = document.getElementById("message");
        const saveProfileBtn = document.getElementById("saveProfile");
        const metadataPreviewContent = document.getElementById("metadata-preview-content");

        const profileFields = [
            "make", "model", "software", "artist", "copyright",
            "byline", "copyrightNotice", "objectName", "description", "keywords"
        ];

        // Load profile from local storage on page load
        document.addEventListener("DOMContentLoaded", () => {
            loadProfile();
            updateMetadataPreview();
        });

        function loadProfile() {
            profileFields.forEach(field => {
                const element = document.getElementById(field);
                const value = localStorage.getItem(field);
                if (value) {
                    element.value = value;
                }
            });
        }

        function saveProfile() {
            profileFields.forEach(field => {
                const value = document.getElementById(field).value;
                localStorage.setItem(field, value);
            });
            messageDiv.textContent = "Profile saved successfully!";
            messageDiv.classList.remove("error");
            messageDiv.style.display = "block";
            setTimeout(() => messageDiv.style.display = "none", 3000);
            updateMetadataPreview();
        }

        function updateMetadataPreview() {
            let previewText = ";; Live Metadata Preview (simulated) ;;\n\n";
            profileFields.forEach(field => {
                const value = document.getElementById(field).value;
                if (value) {
                    previewText += `${field.charAt(0).toUpperCase() + field.slice(1)}: ${value}\n`;
                }
            });
            // Add randomized fields for preview (simulated)
            previewText += `\nEXIF:DateTimeOriginal: (Randomized)\n`;
            previewText += `EXIF:CreateDate: (Randomized)\n`;
            previewText += `EXIF:ModifyDate: (Randomized)\n`;
            previewText += `EXIF:SerialNumber: (Randomized)\n`;

            metadataPreviewContent.textContent = previewText;
        }

        // Add event listeners to update preview on input change
        profileFields.forEach(field => {
            document.getElementById(field).addEventListener("input", updateMetadataPreview);
        });

        saveProfileBtn.addEventListener("click", saveProfile);

        dropArea.addEventListener("click", () => fileInput.click());

        ["dragenter", "dragover", "dragleave", "drop"].forEach(eventName => {
            dropArea.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ["dragenter", "dragover"].forEach(eventName => {
            dropArea.addEventListener(eventName, highlight, false);
        });

        ["dragleave", "drop"].forEach(eventName => {
            dropArea.addEventListener(eventName, unhighlight, false);
        });

        function highlight() {
            dropArea.classList.add("highlight");
        }

        function unhighlight() {
            dropArea.classList.remove("highlight");
        }

        dropArea.addEventListener("drop", handleDrop, false);

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            handleFiles(files);
        }

        fileInput.addEventListener("change", (e) => {
            handleFiles(e.target.files);
        });

        async function handleFiles(files) {
            if (files.length === 0) return;

            const file = files[0];
            messageDiv.textContent = `Processing ${file.name}...`;
            messageDiv.classList.remove("error");
            messageDiv.style.display = "block";

            const formData = new FormData();
            formData.append("image", file);

            // Get custom metadata from local storage or current input values
            const customMetadata = {};
            profileFields.forEach(field => {
                customMetadata[field] = document.getElementById(field).value;
            });
            formData.append("customMetadata", JSON.stringify(customMetadata));

            try {
                const response = await fetch("/upload", {
                    method: "POST",
                    body: formData,
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const originalFileName = file.name;
                    const processedFileName = `Archive_${originalFileName}`;

                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement("a");
                    a.style.display = "none";
                    a.href = url;
                    a.download = processedFileName; // Set the custom download filename
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);

                    messageDiv.textContent = "Success! File downloaded.";
                    fileInput.value = ""; // Clear the file input
                    setTimeout(() => messageDiv.style.display = "none", 3000);
                } else {
                    const errorText = await response.text();
                    messageDiv.textContent = `Error: ${errorText}`;
                    messageDiv.classList.add("error");
                    setTimeout(() => messageDiv.style.display = "none", 5000);
                }
            } catch (error) {
                messageDiv.textContent = `Network error: ${error.message}`;
                messageDiv.classList.add("error");
                setTimeout(() => messageDiv.style.display = "none", 5000);
            }
        }
    </script>
</body>
</html>
