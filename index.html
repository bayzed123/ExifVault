
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bayezid Storyline Archival Tool</title>
    <style>
        :root {
            --accent: #c9a86a;
            --bg: #0a0a0a;
            --card: #141414;
            --text: #e0e0e0;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: var(--card);
            padding: 50px;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            text-align: center;
            width: 90%;
            max-width: 650px;
            border: 1px solid #2a2a2a;
        }
        h1 {
            color: var(--accent);
            margin-bottom: 5px;
            font-size: 2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .tagline {
            color: #666;
            margin-bottom: 40px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .drop-area {
            border: 2px dashed #333;
            border-radius: 10px;
            padding: 80px 20px;
            cursor: pointer;
            transition: 0.3s;
            background-color: #0d0d0d;
        }
        .drop-area:hover, .drop-area.highlight {
            border-color: var(--accent);
            background-color: #1a1a1a;
        }
        .drop-area p {
            margin: 0;
            font-size: 1.2rem;
            color: #999;
        }
        input[type="file"] {
            display: none;
        }
        #status {
            margin-top: 30px;
            font-weight: 600;
            font-size: 1rem;
            height: 24px;
        }
        .processing { color: var(--accent); }
        .success { color: #4caf50; }
        .error { color: #f44336; }
        
        .footer {
            margin-top: 50px;
            font-size: 0.75rem;
            color: #444;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bayezid Storyline</h1>
        <div class="tagline">Automated High-Res Archival Suite</div>
        
        <div class="drop-area" id="drop-area">
            <p>DEPOSIT ASSET FOR INSTANT ARCHIVAL</p>
            <span style="font-size: 0.7rem; color: #555; display: block; margin-top: 10px;">JPG, PNG, WEBP UP TO 50MB</span>
            <input type="file" id="fileInput" accept="image/*">
        </div>
        
        <div id="status"></div>
    </div>
    
    <div class="footer">
        PROFESSIONAL GRADE METADATA MANIPULATION
    </div>

    <script>
        const dropArea = document.getElementById('drop-area');
        const fileInput = document.getElementById('fileInput');
        const status = document.getElementById('status');

        dropArea.onclick = () => fileInput.click();

        fileInput.onchange = (e) => handleFiles(e.target.files);

        dropArea.ondragover = (e) => {
            e.preventDefault();
            dropArea.classList.add('highlight');
        };

        dropArea.ondragleave = () => {
            dropArea.classList.remove('highlight');
        };

        dropArea.ondrop = (e) => {
            e.preventDefault();
            dropArea.classList.remove('highlight');
            handleFiles(e.dataTransfer.files);
        };

        async function handleFiles(files) {
            if (files.length === 0) return;
            const file = files[0];
            
            status.textContent = `COMMITTING ${file.name.toUpperCase()} TO ARCHIVE...`;
            status.className = 'processing';

            const formData = new FormData();
            formData.append('image', file);
            
            // Hardcoded Bayezid Signature
            const meta = {
                make: "Epson",
                model: "Perfection V850 Pro",
                artist: "Bayezid Storyline",
                description: "Historical Archive Restoration",
                keywords: "history, archive, rare"
            };
            formData.append('customMetadata', JSON.stringify(meta));

            try {
                const res = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                if (res.ok) {
                    const blob = await res.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `Archive_${file.name}`;
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    
                    status.textContent = "ARCHIVAL COMPLETE. DOWNLOAD INITIATED.";
                    status.className = 'success';
                    fileInput.value = '';
                } else {
                    const errText = await res.text();
                    status.textContent = "ARCHIVAL ERROR: " + errText;
                    status.className = 'error';
                }
            } catch (err) {
                status.textContent = "CONNECTION ERROR: " + err.message;
                status.className = 'error';
            }
        }
    </script>
</body>
</html>
