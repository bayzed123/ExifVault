
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bayezid Storyline | Curator's Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --card: #0f0f0f;
            --accent: #c9a86a;
            --text: #e0e0e0;
            --text-dim: #777;
            --border: #222;
            --input-bg: #151515;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .dashboard {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 30px;
        }

        @media (max-width: 1000px) { .dashboard { grid-template-columns: 1fr; } }

        /* LEFT COLUMN: UPLOAD & INFO */
        .left-col { display: flex; flex-direction: column; gap: 20px; }

        .panel {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 25px;
            border-radius: 4px;
        }

        .header h1 {
            font-family: 'Cinzel', serif;
            color: var(--accent);
            font-size: 1.5rem;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .drop-zone {
            border: 1px dashed var(--border);
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            background: #0a0a0a;
            margin-bottom: 20px;
        }
        .drop-zone:hover { border-color: var(--accent); background: #111; }

        #asset-preview {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            display: none;
            margin-bottom: 15px;
            border: 1px solid var(--border);
        }

        .asset-info { font-size: 0.8rem; color: var(--text-dim); line-height: 1.8; }
        .asset-info b { color: var(--accent); }

        /* RIGHT COLUMN: PRESETS & ADVANCED EDITOR */
        .right-col { display: flex; flex-direction: column; gap: 20px; }

        .presets { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        .preset-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 8px 15px;
            font-size: 0.7rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .preset-btn:hover, .preset-btn.active { border-color: var(--accent); color: var(--accent); }

        .tag-editor {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            max-height: 600px;
            overflow-y: auto;
            padding-right: 10px;
        }
        .tag-editor::-webkit-scrollbar { width: 4px; }
        .tag-editor::-webkit-scrollbar-thumb { background: var(--border); }

        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; font-weight: 700; }
        .input-group input {
            background: var(--input-bg);
            border: 1px solid var(--border);
            padding: 10px;
            color: var(--text);
            font-size: 0.8rem;
            outline: none;
        }
        .input-group input:focus { border-color: var(--accent); }

        .btn-archive {
            width: 100%;
            background: var(--accent);
            color: #000;
            border: none;
            padding: 18px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }
        .btn-archive:hover { background: #dcb97a; transform: translateY(-2px); }
        .btn-archive:disabled { background: #333; color: #666; cursor: not-allowed; }

        #status {
            font-size: 0.8rem;
            text-align: center;
            margin-top: 15px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- LEFT: UPLOAD & INFO -->
        <div class="left-col">
            <div class="panel header">
                <h1>BAYEZID STORYLINE</h1>
                <p style="font-size: 0.7rem; color: var(--text-dim); letter-spacing: 1px;">CURATOR'S DASHBOARD V3.0</p>
            </div>

            <div class="panel">
                <div class="drop-zone" id="drop-zone">
                    <p style="font-size: 0.9rem; color: #888;">DEPOSIT HIGH-RES ASSET</p>
                    <input type="file" id="file-input" style="display: none;" accept="image/*">
                </div>
                <img id="asset-preview" src="" alt="Preview">
                <div class="asset-info" id="asset-info">
                    Select an asset to view technical data...
                </div>
            </div>
        </div>

        <!-- RIGHT: PRESETS & EDITOR -->
        <div class="right-col">
            <div class="panel">
                <h2 style="font-size: 0.8rem; color: var(--accent); margin-bottom: 15px; letter-spacing: 2px;">ARCHIVAL PRESETS</h2>
                <div class="presets">
                    <button class="preset-btn" onclick="applyPreset('historical')">Historical Archive</button>
                    <button class="preset-btn" onclick="applyPreset('ai_mask')">AI Origin Mask</button>
                    <button class="preset-btn" onclick="applyPreset('restoration')">Photo Restoration</button>
                </div>

                <h2 style="font-size: 0.8rem; color: var(--accent); margin-bottom: 15px; letter-spacing: 2px; border-top: 1px solid var(--border); padding-top: 15px;">ADVANCED TAG EDITOR</h2>
                <div class="tag-editor" id="tag-editor">
                    <!-- Dynamic Tag Inputs -->
                </div>

                <button class="btn-archive" id="btn-archive" disabled>COMMIT TO ARCHIVE</button>
                <div id="status"></div>
            </div>
        </div>
    </div>

    <script>
        const tags = [
            "Make", "Model", "Artist", "Software", "Copyright", "By-line", "CopyrightNotice", "ObjectName",
            "Caption-Abstract", "Keywords", "FileName", "FileSize", "FileType", "FileTypeExtension", "MIMEType",
            "ImageWidth", "ImageHeight", "BitDepth", "ColorType", "Compression", "Filter", "Interlace",
            "JUMDType", "JUMDLabel", "C2PAIconSalt", "C2PAIconType", "C2PAIconData", "C2PAActionsV2Salt",
            "ActionsAction", "ActionsWhen", "ActionsSoftwareAgentName", "ActionsSoftwareAgentVersion",
            "ActionsDigitalSourceType", "C2PACertificate-statusSalt", "OcspVals", "C2PAHashDataSalt",
            "ExclusionsStart", "ExclusionsLength", "Name", "Alg", "Hash", "Pad", "InstanceID",
            "Claim_Generator_InfoName", "Claim_Generator_InfoIconUrl", "Claim_Generator_InfoIconHash",
            "Claim_Generator_InfoSpecVersion", "Claim_Generator_InfoOrgContentauthC2Pa_Rs", "Signature",
            "Created_AssertionsUrl", "Created_AssertionsHash", "Title", "Category", "raw_header"
        ];

        const editor = document.getElementById('tag-editor');
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const preview = document.getElementById('asset-preview');
        const info = document.getElementById('asset-info');
        const btnArchive = document.getElementById('btn-archive');
        const status = document.getElementById('status');

        let activeFile = null;

        // Initialize Editor
        tags.forEach(tag => {
            const group = document.createElement('div');
            group.className = 'input-group';
            group.innerHTML = `<label>${tag.replace(/_/g, ' ')}</label><input type="text" id="tag-${tag}" placeholder="Auto-generated...">`;
            editor.appendChild(group);
        });

        function applyPreset(type) {
            const defaults = {
                historical: { Make: "Epson", Model: "Perfection V850 Pro", Artist: "Bayezid Storyline", ObjectName: "Historical Archive" },
                ai_mask: { Software: "VueScan 9", Artist: "Bayezid Storyline", Copyright: "© 2026 Bayezid Storyline" },
                restoration: { Caption_Abstract: "Restored by Bayezid Storyline", Keywords: "restored, historical, rare" }
            };
            const p = defaults[type];
            for (let k in p) {
                const el = document.getElementById(`tag-${k.replace(/-/g, '_')}`);
                if (el) el.value = p[k];
            }
        }

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = e => handleFile(e.target.files[0]);

        function handleFile(file) {
            if (!file) return;
            activeFile = file;
            const reader = new FileReader();
            reader.onload = e => {
                preview.src = e.target.result;
                preview.style.display = 'block';
                btnArchive.disabled = false;
                
                // Show Basic Info
                info.innerHTML = `
                    <b>FILENAME:</b> ${file.name}<br>
                    <b>SIZE:</b> ${(file.size / 1024 / 1024).toFixed(2)} MB<br>
                    <b>TYPE:</b> ${file.type}<br>
                    <b>LAST MODIFIED:</b> ${new Date(file.lastModified).toLocaleString()}
                `;

                // Auto-fill some tags
                document.getElementById('tag-FileName').value = file.name;
                document.getElementById('tag-FileSize').value = `${(file.size / 1024 / 1024).toFixed(2)} MB`;
                document.getElementById('tag-MIMEType').value = file.type;
            };
            reader.readAsDataURL(file);
        }

        btnArchive.onclick = async () => {
            btnArchive.disabled = true;
            status.textContent = "COMMITTING ARCHIVAL SIGNATURE...";
            status.style.color = "var(--accent)";

            const formData = new FormData();
            formData.append('image', activeFile);
            
            const meta = {};
            tags.forEach(tag => {
                const val = document.getElementById(`tag-${tag}`).value;
                if (val) meta[tag] = val;
            });
            formData.append('customMetadata', JSON.stringify(meta));

            try {
                const res = await fetch('/upload', { method: 'POST', body: formData });
                if (res.ok) {
                    const blob = await res.blob();
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `Archive_${activeFile.name}`;
                    a.click();
                    status.textContent = "SUCCESS. ASSET ARCHIVED.";
                    status.style.color = "#4caf50";
                } else {
                    throw new Error(await res.text());
                }
            } catch (err) {
                status.textContent = "ERROR: " + err.message;
                status.style.color = "#f44336";
            } finally {
                btnArchive.disabled = false;
            }
        };
    </script>
</body>
</html>
