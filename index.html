
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bayezid Storyline Archival Tool</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f0f0f;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1a1a1a;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            width: 90%;
            max-width: 600px;
            border: 1px solid #333;
        }
        h1 {
            color: #c9a86a;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        p {
            color: #888;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }
        .drop-area {
            border: 2px dashed #444;
            border-radius: 8px;
            padding: 60px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            background-color: #222;
        }
        .drop-area:hover, .drop-area.highlight {
            border-color: #c9a86a;
            background-color: #2a2a2a;
        }
        .drop-area p {
            margin: 0;
            font-size: 1.1rem;
            color: #bbb;
        }
        input[type="file"] {
            display: none;
        }
        .status {
            margin-top: 20px;
            font-weight: bold;
            height: 24px;
        }
        .success { color: #4caf50; }
        .error { color: #f44336; }
        .processing { color: #c9a86a; }
        
        .footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bayezid Storyline Archival Tool</h1>
        <p>Upload & Instantly Download: Stripping AI Tags & Injecting Custom Profile</p>
        
        <div class="drop-area" id="drop-area">
            <p>Drag & Drop Image or Click to Select</p>
            <input type="file" id="fileInput" accept="image/jpeg, image/png, image/webp">
        </div>
        
        <div class="status" id="status"></div>
    </div>
    
    <div class="footer">
        © 2026 Bayezid Storyline Historical Archive
    </div>

    <script>
        const dropArea = document.getElementById('drop-area');
        const fileInput = document.getElementById('fileInput');
        const status = document.getElementById('status');

        dropArea.onclick = () => fileInput.click();

        fileInput.onchange = (e) => handleFiles(e.target.files);

        dropArea.ondragover = (e) => {
            e.preventDefault();
            dropArea.classList.add('highlight');
        };

        dropArea.ondragleave = () => {
            dropArea.classList.remove('highlight');
        };

        dropArea.ondrop = (e) => {
            e.preventDefault();
            dropArea.classList.remove('highlight');
            handleFiles(e.dataTransfer.files);
        };

        async function handleFiles(files) {
            if (files.length === 0) return;
            const file = files[0];
            
            status.textContent = `Processing ${file.name}...`;
            status.className = 'status processing';

            const formData = new FormData();
            formData.append('image', file);
            
            // Default Profile
            const meta = {
                make: "Epson",
                model: "Perfection V850 Pro",
                artist: "Bayezid Storyline",
                description: "Historical Archive Restoration",
                keywords: "history, archive, rare"
            };
            formData.append('customMetadata', JSON.stringify(meta));

            try {
                const res = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                if (res.ok) {
                    const blob = await res.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `Archive_${file.name}`;
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    
                    status.textContent = "Success! Archive Downloaded.";
                    status.className = 'status success';
                    fileInput.value = '';
                } else {
                    const errText = await res.text();
                    status.textContent = "Error: " + errText;
                    status.className = 'status error';
                }
            } catch (err) {
                status.textContent = "Network Error: " + err.message;
                status.className = 'status error';
            }
        }
    </script>
</body>
</html>
