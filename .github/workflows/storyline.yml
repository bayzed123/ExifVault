name: Storyline Archiver CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Run Server or Script
        env:
          # Ekhane GitHub apnar secret ti extract kore environment variable hisebe pass korbe
          MANUS_API_KEY: ${{ secrets.metadatainjector }}
        run: |
          echo "Environment is ready with the secret injected."
          # node server.js (ba apnar jekono script run command)