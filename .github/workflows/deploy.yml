name: Storyline Archiver Deploy & Update

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual update'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 8

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'pnpm'

    - name: Install Dependencies
      run: pnpm install

    - name: Install ExifTool
      run: sudo apt-get update && sudo apt-get install -y libimage-exiftool-perl

    - name: Verify Environment
      run: |
        node -v
        pnpm -v
        exiftool -version
        
    - name: Build Log
      run: |
        echo "Update triggered by ${{ github.actor }}: ${{ inputs.reason || 'Push to main' }}"